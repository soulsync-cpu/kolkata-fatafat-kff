<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KFF - Kolkata Fatafat Links</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#111827;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      color:#22c55e;
      margin-bottom:10px;
    }

    .subtitle{
      color:#cbd5e1;
      margin-bottom:30px;
      line-height:1.6;
    }

    .link-box{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .site-btn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#1e293b;
      border:1px solid rgba(255,255,255,0.08);
      padding:16px 20px;
      border-radius:14px;
      text-decoration:none;
      color:white;
      transition:0.3s ease;
      font-size:16px;
      font-weight:bold;
    }

    .site-btn:hover{
      transform:translateY(-3px);
      background:#22c55e;
      color:#000;
    }

    .status{
      font-size:13px;
      padding:5px 10px;
      border-radius:20px;
      background:#16a34a;
      color:white;
    }

    .footer{
      margin-top:25px;
      font-size:14px;
      color:#94a3b8;
      line-height:1.6;
    }

    .telegram{
      margin-top:20px;
    }

    .telegram a{
      color:#38bdf8;
      text-decoration:none;
      font-weight:bold;
    }

    @media(max-width:500px){
      .site-btn{
        flex-direction:column;
        gap:10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">KFF</div>

    <div class="subtitle">
      Kolkata Fatafat Online Platform 🚀<br>
      If one link is down, use another mirror link below.
    </div>

    <div class="link-box">

      <a class="site-btn" href="https://fatafat.online" target="_blank">
        <span>fatafat.online</span>
        <span class="status">LIVE</span>
      </a>

      <a class="site-btn" href="https://fatafat.gamer.gd" target="_blank">
        <span>fatafat.gamer.gd</span>
        <span class="status">LIVE</span>
      </a>

      <a class="site-btn" href="https://kolkataff.gamer.gd" target="_blank">
        <span>kolkataff.gamer.gd</span>
        <span class="status">LIVE</span>
      </a>

    </div>

    <div class="telegram">
      Join Updates Channel:<br>
      <a href="https://t.me/" target="_blank">Telegram Support</a>
    </div>

    <div class="footer">
      ✔ Same Database<br>
      ✔ Same User Account<br>
      ✔ Same Balance & Games
    </div>

  </div>

  <script>

  </script>

</body>
</html>
